<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UworkPlus - 加载中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); */
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }

        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .logo-section {
            margin-bottom: 60px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #60a5fa, #3b82f6, #1d4ed8);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
        }

        .logo-inner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            animation: rotate 3s linear infinite;
        }
        .logo-inner img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
            letter-spacing: 2px;
        }

        .loading-animation {
            margin-bottom: 40px;
            text-align: center;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #60a5fa;
            animation: bounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        .loading-text {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .progress-bar {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            border-radius: 3px;
            transition: width 0.3s ease;
            position: relative;
            width: 0%;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .progress-text {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 600;
        }

        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            /* background: rgba(96, 165, 250, 0.3); */
            background: #ffffff;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        .grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.1), transparent);
            animation: scan 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 50px rgba(96, 165, 250, 0.5);
            }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.7;
            }
        }

        @keyframes scan {
            0% {
                opacity: 0;
                transform: scaleX(0);
            }
            50% {
                opacity: 1;
                transform: scaleX(1);
            }
            100% {
                opacity: 0;
                transform: scaleX(0);
            }
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }
    </style>
</head>
<body>
    <div class="loading-container" id="loadingContainer">
        <!-- Logo区域 -->
        <div class="logo-section">
            <div class="logo">
                <div class="logo-inner">
                    <img src="./assets/logo/logo.png" alt="logo" class="logo-img">
                </div>
            </div>
            <h1 class="app-title">UworkPlus</h1>
        </div>

        <!-- 加载动画 -->
        <div class="loading-animation">
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="loading-text" id="loadingText">正在启动应用...</div>
        </div>

        <!-- 进度条 -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <!-- 背景动画 -->
        <div class="background-animation">
            <div id="particles"></div>
            <div id="gridLines"></div>
        </div>
    </div>

    <script>
        // 创建粒子效果
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4 + 2;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const delay = Math.random() * 3;
                const duration = Math.random() * 2 + 2;
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}%;
                    top: ${y}%;
                    animation-delay: ${delay}s;
                    animation-duration: ${duration}s;
                `;
                
                particlesContainer.appendChild(particle);
            }
        }

        // 创建网格线效果
        function createGridLines() {
            const gridContainer = document.getElementById('gridLines');
            for (let i = 1; i <= 10; i++) {
                const line = document.createElement('div');
                line.className = 'line';
                
                const isVertical = i % 2 === 0;
                const position = (i - 1) * 10;
                
                line.style.cssText = `
                    left: ${isVertical ? position + '%' : '0%'};
                    top: ${isVertical ? '0%' : position + '%'};
                    width: ${isVertical ? '1px' : '100%'};
                    height: ${isVertical ? '100%' : '1px'};
                    animation-delay: ${i * 0.1}s;
                `;
                
                gridContainer.appendChild(line);
            }
        }

        // 更新加载进度
        function updateProgress(progress, text) {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const loadingText = document.getElementById('loadingText');
            
            progressFill.style.width = progress + '%';
            progressText.textContent = Math.round(progress) + '%';
            if (text) {
                loadingText.textContent = text;
            }
        }

        // 隐藏加载界面
        function hideLoading() {
            const container = document.getElementById('loadingContainer');
            container.classList.add('fade-out');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            createGridLines();
            
            // 模拟加载进度
            const loadingMessages = [
                '正在启动应用...',
                '初始化组件...',
                '加载配置文件...',
                '连接服务...',
                '准备就绪...'
            ];
            
            let currentStep = 0;
            const steps = [20, 40, 60, 80, 100];
            let progress = 0;
            
            const interval = setInterval(() => {
                if (progress < 100 && currentStep < steps.length) {
                    const targetProgress = steps[currentStep];
                    const increment = Math.min(5, targetProgress - progress);
                    
                    if (increment > 0) {
                        progress += increment;
                    } else {
                        currentStep++;
                    }
                    
                    updateProgress(progress, loadingMessages[currentStep] || loadingMessages[loadingMessages.length - 1]);
                } else {
                    clearInterval(interval);
                }
            }, 300);
        });

        // 暴露给主进程调用的方法
        window.loadingAPI = {
            updateProgress,
            hideLoading
        };
    </script>
</body>
</html>
